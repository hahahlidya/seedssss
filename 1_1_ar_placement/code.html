<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "on-primary-fixed": "#001c39",
            "on-surface-variant": "#c1c6d7",
            "inverse-primary": "#0060ab",
            "on-background": "#e2e2e6",
            "on-tertiary-fixed": "#001f2a",
            "on-secondary-fixed": "#341100",
            "secondary-container": "#fd6c00",

            "on-tertiary": "#163440",
            "error": "#ffb4ab",
            "surface-variant": "#333538",
            "tertiary": "#adcbda",
            "background": "#111316",
            "tertiary-fixed": "#c9e7f7",
            "primary-container": "#1493ff",
            "on-primary-fixed-variant": "#004883",
            "inverse-on-surface": "#2f3034",
            "surface-container-high": "#282a2d",
            "on-secondary": "#562000",
            "on-primary": "#00315d",
            "surface-tint": "#a3c9ff",
            "surface-container": "#1e2023",
            "on-secondary-container": "#562000",
            "surface-dim": "#111316",
            "primary": "#a3c9ff",
            "outline-variant": "#414754",
            "on-primary-container": "#002a51",
            "surface": "#111316",
            "tertiary-container": "#7895a3",
            "primary-fixed-dim": "#a3c9ff",
            "on-surface": "#e2e2e6",
            "outline": "#8b90a0",
            "error-container": "#93000a",
            "inverse-surface": "#e2e2e6",

            "secondary-fixed-dim": "#ffb692",
            "surface-container-highest": "#333538",
            "secondary": "#ffb692",
            "surface-bright": "#37393d",
            "on-secondary-fixed-variant": "#7a3000",
            "tertiary-fixed-dim": "#adcbda",
            "on-error": "#690005",
            "primary-fixed": "#d3e3ff",
            "surface-container-lowest": "#0c0e11",
            "surface-container-low": "#1a1c1f",

          fontFamily: {
            "headline": ["Space Grotesk"],
            "body": ["Inter"],
            "label": ["Inter"]
          },
          borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
        },
      },
    }

<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .ar-grid {
      background-image: radial-gradient(circle, rgba(163, 201, 255, 0.1) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .wireframe-mesh {
      background: linear-gradient(90deg, rgba(163, 201, 255, 0.2) 1px, transparent 1px),
                  linear-gradient(rgba(163, 201, 255, 0.2) 1px, transparent 1px);
      background-size: 20px 20px;
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body overflow-hidden">
<!-- TopAppBar -->
<header class="fixed top-0 w-full flex justify-between items-center px-6 h-16 bg-[#111316] dark:bg-[#111316] z-50">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#a3c9ff]" data-icon="precision_manufacturing">precision_manufacturing</span>
<h1 class="font-['Space_Grotesk'] tracking-[0.05em] uppercase text-sm font-bold text-[#a3c9ff]">KINETIC_MONOLITH_OS</h1>
</div>
<div class="flex items-center gap-4">
<button class="hover:bg-[#1e2023] transition-colors p-2 rounded-lg active:scale-95 duration-200">
<span class="material-symbols-outlined text-[#a3c9ff]" data-icon="settings_input_component">settings_input_component</span>
</button>
</div>
</header>
<!-- AR Canvas (Background) -->
<main class="relative w-full h-screen overflow-hidden pt-16 pb-24">
<!-- Factory Floor Background -->
<div class="absolute inset-0 z-0">
<img class="w-full h-full object-cover opacity-60" data-alt="Modern wide industrial factory floor with polished concrete, high ceilings, and metallic structures under bright daylight" src="https://lh3.googleusercontent.com/aida-public/AB6AXuACBdAC5VHfseVHWn7cqAPdjryCoC6z6idwnQuYFKPuV31Pu8FvH5pwSsPgFfBQ6uq8go15_u569kOFR9Bi5n4W-0nkAWkoqYhXOkDdrWRqduSJfekhbLOpADuusvnOvoF735uZcqo1VRUuDlx2ij7UMcL9OqRr9gy92LxXm_UF1oSZLtQImaBzxsAbXDtzsBpgz2c5FlHDm15koZZIBYdMtpLGK0JCd1pnNRtxYHwFcMoF6Mfrp7pec0lafOqCmNf6LXkpX8iIwhqn"/>
<div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-transparent opacity-80"></div>
<!-- AR Grid Overlay -->
<div class="absolute inset-0 ar-grid pointer-events-none"></div>
</div>
<!-- 3D Model Proxy (Wireframe representation) -->
<div class="absolute inset-0 flex items-center justify-center z-10 pointer-events-none">
<div class="relative w-96 h-96 transform rotate-x-12 rotate-y-45 perspective-1000">
<!-- Wireframe Cube Representative of Machine -->
<div class="absolute inset-0 border-2 border-primary/40 wireframe-mesh rounded-lg shadow-[0_0_50px_rgba(20,147,255,0.2)]"></div>
<div class="absolute -inset-4 border border-primary/20 rounded-xl"></div>
<!-- Machine Metadata Tag -->
<div class="absolute -top-16 left-1/2 -translate-x-1/2 bg-surface-container-high/80 backdrop-blur-xl p-3 border-l-2 border-primary pointer-events-auto">
<div class="flex flex-col">
<span class="font-headline text-[10px] tracking-[0.1em] text-primary">ENTITY: SCREEN_PRINTER_V4</span>
<span class="font-headline text-lg font-bold">1:1 SCALE SYNCED</span>
</div>
</div>
</div>
</div>
<!-- HUD / Status Layer -->
<div class="absolute inset-x-0 top-24 px-6 z-20 pointer-events-none">
<div class="flex flex-col gap-2 max-w-xs">
<div class="bg-surface-container-lowest/60 backdrop-blur-md px-4 py-2 flex items-center gap-3 border-l-4 border-primary">
<span class="material-symbols-outlined text-primary text-sm" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<p class="font-headline text-[10px] tracking-widest uppercase font-bold text-on-surface">Machine placed at 1:1 scale</p>
</div>
<div class="bg-surface-container-lowest/60 backdrop-blur-md px-4 py-2 flex items-center gap-3">
<span class="material-symbols-outlined text-on-surface-variant text-sm animate-pulse" data-icon="radar">radar</span>
<p class="font-headline text-[10px] tracking-widest uppercase font-bold text-on-surface-variant">Searching for surface...</p>
</div>
</div>
</div>
<!-- Side Diagnostics (Asymmetric UI) -->
<div class="absolute right-6 top-24 z-20 flex flex-col gap-4">
<div class="bg-surface-container-low/40 backdrop-blur-xl p-4 border border-outline-variant/10">
<p class="font-headline text-[10px] tracking-[0.15em] uppercase text-on-surface-variant mb-4">Spatial Telemetry</p>
<div class="space-y-4">
<div class="flex justify-between items-end gap-8">
<span class="font-headline text-[10px] text-on-surface-variant">X-AXIS</span>
<span class="font-headline text-sm font-bold text-primary">1,244.02 MM</span>
</div>
<div class="flex justify-between items-end gap-8">
<span class="font-headline text-[10px] text-on-surface-variant">Y-AXIS</span>
<span class="font-headline text-sm font-bold text-primary">0.00 MM</span>
</div>
<div class="flex justify-between items-end gap-8">
<span class="font-headline text-[10px] text-on-surface-variant">HEADING</span>
<span class="font-headline text-sm font-bold text-primary">14.5°</span>
</div>
</div>
</div>
</div>
<!-- Bottom Controls Overlay (Before Nav) -->
<div class="absolute bottom-32 left-1/2 -translate-x-1/2 z-30 w-full max-w-lg px-6">
<div class="bg-surface-container-high/80 backdrop-blur-2xl rounded-xl p-6 shadow-2xl border border-outline-variant/20">
<div class="grid grid-cols-3 gap-4">
<!-- Rotate -->
<button class="group flex flex-col items-center justify-center gap-2 p-3 hover:bg-surface-bright transition-all active:scale-95 duration-200">
<span class="material-symbols-outlined text-on-surface opacity-70 group-hover:opacity-100" data-icon="rotate_right">rotate_right</span>
<span class="font-headline text-[10px] font-bold tracking-widest">ROTATE</span>
</button>
<!-- Scale -->
<button class="group flex flex-col items-center justify-center gap-2 p-3 hover:bg-surface-bright transition-all active:scale-95 duration-200">
<span class="material-symbols-outlined text-on-surface opacity-70 group-hover:opacity-100" data-icon="open_with">open_with</span>
<span class="font-headline text-[10px] font-bold tracking-widest">SCALE</span>
</button>
<!-- Flip -->
<button class="group flex flex-col items-center justify-center gap-2 p-3 hover:bg-surface-bright transition-all active:scale-95 duration-200">
<span class="material-symbols-outlined text-on-surface opacity-70 group-hover:opacity-100" data-icon="flip">flip</span>
<span class="font-headline text-[10px] font-bold tracking-widest">MIRROR</span>
</button>
</div>
<button class="w-full mt-6 py-4 bg-gradient-to-r from-primary to-primary-container text-on-primary font-headline font-bold tracking-[0.2em] uppercase rounded-lg hover:shadow-[0_0_25px_rgba(20,147,255,0.4)] transition-all active:scale-95 duration-150">
          Confirm Placement
        </button>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 bg-[#111316]/80 backdrop-blur-xl z-50 border-t border-[#1e2023]/30 shadow-[0_-10px_30px_rgba(0,0,0,0.5)]">
<a class="flex flex-col items-center justify-center text-[#e2e2e6] opacity-40 hover:opacity-100 hover:text-[#a3c9ff] transition-all active:translate-y-0.5 duration-150" href="#">
<span class="material-symbols-outlined text-2xl" data-icon="view_in_ar">view_in_ar</span>
<span class="font-['Space_Grotesk'] text-[10px] font-bold tracking-widest mt-1">SHOWROOM</span>
</a>
<a class="flex flex-col items-center justify-center text-[#e2e2e6] opacity-40 hover:opacity-100 hover:text-[#a3c9ff] transition-all active:translate-y-0.5 duration-150" href="#">
<span class="material-symbols-outlined text-2xl" data-icon="layers">layers</span>
<span class="font-['Space_Grotesk'] text-[10px] font-bold tracking-widest mt-1">DETAIL</span>
</a>
<a class="flex flex-col items-center justify-center text-[#a3c9ff] bg-[#1e2023] rounded-lg py-1 px-3 shadow-[0_0_15px_rgba(20,147,255,0.2)] active:translate-y-0.5 duration-150" href="#">
<span class="material-symbols-outlined text-2xl" data-icon="view_in_ar" style="font-variation-settings: 'FILL' 1;">view_in_ar</span>
<span class="font-['Space_Grotesk'] text-[10px] font-bold tracking-widest mt-1">AR_SYNC</span>
</a>
<a class="flex flex-col items-center justify-center text-[#e2e2e6] opacity-40 hover:opacity-100 hover:text-[#a3c9ff] transition-all active:translate-y-0.5 duration-150" href="#">
<span class="material-symbols-outlined text-2xl" data-icon="hub">hub</span>
<span class="font-['Space_Grotesk'] text-[10px] font-bold tracking-widest mt-1">HUB</span>
</a>
</nav>
</body></html>
